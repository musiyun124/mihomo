  - RULE-SET,Twitter_IP,Twitter(X),no-resolve

  - PROCESS-NAME,com.openai.chatgpt,AI
  - RULE-SET,AI_域,AI
  - RULE-SET,AI_IP,AI,no-resolve

  - RULE-SET,FCM_域,GoogleFCM

  - RULE-SET,YouTube_域,YouTube
