# 模型自动更新
lgbm-auto-update: true
lgbm-update-interval: 72
lgbm-url: "https://v6.gh-proxy.org/https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin"

# GeoIP/ASN数据库配置
geodata-mode: false
geo-auto-update: true
geo-update-interval: 24
geox-url:
  asn: "https://v6.gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# 基本配置
mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
ipv6: false
mode: Rule
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: silent
bind-address: "*"
find-process-mode: always
external-controller: 0.0.0.0:9090
external-ui-url: "https://v6.gh-proxy.org/https://github.com/musiyun124/zashboard/archive/refs/heads/gh-pages-no-fonts.zip"
external-ui: "dashboard"
secret: ""

# 订阅健康检查
p: &p
  type: http
  interval: 21600
  health-check:
    enable: true
    url: 'https://connectivitycheck.gstatic.com/generate_204'
    interval: 1800
    timeout: 5000
  proxy: 订阅更新
#  exclude-filter: '(?i)官网|邀请|到期|流量|更新|验证|剩余|频道|长期|推广|分享|周期|我的'
  header:
      User-Agent:
      - "ClashMetaForAndroid/v2.11.29"

#·智能组管理
s: &s
  type: smart
  uselightgbm: true
  prefer-asn: true
  hidden: true

proxy-providers:
  proxy1:
    <<: *p
    override:
      additional-prefix: "Main:" #节点前缀名
    path: ./proxy_provider/proxy1.yaml
    url: "订阅地址"
  
#  proxy2:
#    <<: *p
#    override:
#      additional-prefix: "xxx:" #节点前缀名
#    path: ./proxy_provider/proxy2.yaml
#    url: "订阅地址"

# 节点记忆
profile:
  store-selected: true
  store-fake-ip: true

# 时间校准
ntp:
  enable: true
  write-to-system: true
  server: ntp.aliyun.com
  port: 123
  interval: 60

# 嗅探模块
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 5228, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain: # 如遇需内部通信的应用请放行该域名
    - "Mijia Cloud"

# 网卡模块
tun:
  exclude-uid: []
  include-uid: []
  enable: false  # true 开 # false 默认关
  device: ikun
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
  exclude-package:

# DNS模块
dns:
  enable: true
  ipv6: false
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,CN_域,real-ip
    - RULE-SET,Fake-IP-Filter,real-ip
    - RULE-SET,FCM_域,real-ip
    - MATCH,fake-ip
  default-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "RULE-SET:CN_域,FCM_域":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  nameserver:
    - https://cloudflare-dns.com/dns-query#DNS连接
    - https://dns.google/dns-query#DNS连接
# 特殊代理节点定义
proxies:
  - {name: 🇨🇳 本地直连, type: direct, udp: true}
  - {name: ⛔ 拒绝连接, type: reject}

# 应用分流配置
app_groups: &app_groups
    type: select
    proxies:
      - 总模式
      - 香港·智能
      - 台湾·智能
      - 狮城·智能
      - 日本·智能
      - 美国·智能
      - 手动选择
      - 🇨🇳 本地直连
      - ⛔ 拒绝连接

