  - RULE-SET,Emby_域,Emby
  - RULE-SET,E-hentai_域,E-hentai
  - RULE-SET,Pixiv_域,Pixiv
  - RULE-SET,Discord_域,Discord
  - RULE-SET,TikTok_域,TikTok

